spec_version: 2
description: Deploy a Grafana MCP server that gives AI agents live access to Grafana observability - query Prometheus metrics and Loki logs, search and manage dashboards, and inspect alerts, incidents, and datasources.

metadata:
  self-service: true
  display-name: Grafana MCP Server
  icon:
    path: icons/grafana.svg
  blueprint-labels:
    - type: mcp

# Only three inputs - everything else (image tag, transport, port, endpoint path,
# host allowlist, namespace) is fixed and lives in helm/grafana-mcp/values.yaml.
inputs:
  agent:
    type: agent
    description: Kubernetes agent that runs the Helm grain (same cluster as Grafana).
  # ---- Wired dynamically from the Grafana blueprint (not entered by the user) ----
  grafana_url:
    type: string
    description: In-cluster base URL of Grafana, e.g. http://grafana.grafana.svc.cluster.local:3000. Wired from the Grafana grain output.
  service_account_token:
    type: string
    sensitive: true
    description: Grafana service-account token the MCP server authenticates with. Minted at deploy time and wired from the Grafana grain output.

outputs:
  # In-cluster endpoint of the MCP server, for other in-cluster clients / agents.
  mcp_endpoint:
    value: 'http://grafana-mcp.mcp.svc.cluster.local:8000/mcp'
  # One command to use the server from the Claude CLI: register it (-s user = global
  # scope, works from any directory), then hold the port-forward tunnel open in the
  # foreground (Ctrl+C to stop).
  claude_cli_setup:
    value: 'claude mcp add -s user --transport http grafana-mcp http://localhost:8000/mcp && kubectl port-forward svc/grafana-mcp -n mcp 8000:8000'
  # Unregister the MCP server from the Claude CLI (stop the port-forward separately).
  claude_mcp_delete_command:
    value: 'claude mcp remove -s user grafana-mcp'

grains:
  grafana-mcp:
    kind: helm
    spec:
      source:
        store: torque-demo
        path: helm/grafana-mcp
      agent:
        name: '{{ .inputs.agent }}'
      target-namespace: mcp
      command-arguments: '--create-namespace --wait --timeout 3m'
      # Only the two dynamic secrets are wired; the rest are chart defaults.
      inputs:
        - grafanaUrl: '{{ .inputs.grafana_url }}'
        - serviceAccountToken: '{{ .inputs.service_account_token }}'
