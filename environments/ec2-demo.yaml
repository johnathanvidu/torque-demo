spec_version: 2

environment:
  environment_name: ec2-demo
  owner_email: johnathan.v@quali.com
  state: active
  description: An environment to demonstrate starting and stopping EC2 instances with Torque.
  env-labels:
    - AWS

inputs:
  prefix:
    type: string
    default: ec2-demo
    description: Prefix for all resources created in this environment, to ensure uniqueness.

grains:
  vpc:
    kind: blueprint
    spec:
      source:
        store: torque-demo
        path: blueprints/aws-vpc.yaml
      inputs:
        - agent: vido-vido-prod
        - name: '{{ .inputs.prefix }}-vpc'
        - cidr_block: 10.5.0.0/16
      outputs:
        - vpc_id
        - subnet_id
  ec2:
    kind: blueprint
    depends-on: vpc
    spec:
      source:
        store: torque-demo
        path: blueprints/aws-ec2.yaml
      inputs:
        - agent: vido-vido-prod
        - vpc_id: '{{ .grains.vpc.outputs.vpc_id }}'
        - subnet_id: '{{ .grains.vpc.outputs.subnet_id }}'
        - instance_type: t3.micro
        - instance_name: '{{ .inputs.prefix }}-ec2'
  s3:
    kind: blueprint
    spec:
      source:
        store: torque-demo
        path: blueprints/aws-s3.yaml
      inputs:
        - agent: vido-vido-prod
        - name: 'vido-abcdefg123456-{{ envId | downcase }}'
        - region: eu-west-1
      outputs:
        - s3_bucket_id
        - s3_bucket_arn
        - s3_bucket_domain_name
        - s3_bucket_regional_domain_name
        - s3_bucket_region