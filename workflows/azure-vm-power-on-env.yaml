spec_version: 2
description: This workflow starts all Azure VMs in the environment

workflow:
  scope: env
  labels-selector: "Hyperscaler:Azure"
  triggers:
    - type: manual
    - type: cron
      cron: '0 8 * * *' # every day at 08:00
      overridable: true # Allow end-users to override the cron

inputs:
  agent:
    type: agent

grains:
  start_vm:
    kind: ansible
    spec:
      built-in: true
      source:
        path: https://github.com/QualiTorque/torque-actions.git//resource/azure-power-on-vm-tf.yaml
      agent:
        name: '{{ .inputs.agent }}'
