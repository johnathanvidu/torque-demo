spec_version: 2
description: This workflow stops all ec2s in the environment

workflow:
  scope: env_resource
  labels-selector: "Hyperscaler:AWS"
  resource-types: aws_instance
  triggers:
    - type: manual
    
inputs:
  agent:
    type: agent

grains:
  stop_ec2:
    kind: ansible
    spec:
      built-in: true
      source:
        path: https://github.com/QualiTorque/torque-actions.git//resource/aws-power-off-ec2-tf.yaml
      agent:
        name: '{{ .inputs.agent }}'
