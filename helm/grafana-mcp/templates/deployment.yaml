apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana-mcp
  labels:
    app: grafana-mcp
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: grafana-mcp
  template:
    metadata:
      labels:
        app: grafana-mcp
    spec:
      containers:
        - name: grafana-mcp
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "-t"
            - "{{ .Values.transport }}"
            - "--address"
            - "{{ .Values.bindAddress }}:{{ .Values.port }}"
            - "--allowed-hosts"
            - "{{ .Values.allowedHosts }}"
            - "--endpoint-path"
            - "{{ .Values.endpointPath }}"
          ports:
            - name: http
              containerPort: {{ .Values.port }}
          env:
            - name: GRAFANA_URL
              value: "{{ .Values.grafanaUrl }}"
            - name: GRAFANA_SERVICE_ACCOUNT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: grafana-mcp-auth
                  key: serviceAccountToken
          # TCP probes, not httpGet: the kubelet sends HTTP probes with
          # Host: <podIP>, which mcp-grafana's --allowed-hosts check rejects
          # (the pod IP can't be in the allowlist). A TCP check has no Host
          # header, so it validates the server is listening without tripping the
          # host allowlist, and doesn't depend on the /healthz path existing.
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-mcp-auth
  labels:
    app: grafana-mcp
type: Opaque
stringData:
  serviceAccountToken: "{{ .Values.serviceAccountToken }}"
