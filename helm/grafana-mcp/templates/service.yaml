apiVersion: v1
kind: Service
metadata:
  # Fixed name so the MCP endpoint DNS is deterministic:
  #   http://grafana-mcp.<namespace>.svc.cluster.local:<port>/
  name: grafana-mcp
  labels:
    app: grafana-mcp
spec:
  type: {{ .Values.service.type }}
  selector:
    app: grafana-mcp
  ports:
    - name: http
      port: {{ .Values.port }}
      targetPort: http
      protocol: TCP
